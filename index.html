<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <title>Генератор сказок</title>
</head>

<body>
    <div class="container">
        <div class="container-md d-flex justify-content-center flex-column gap-2">
            <h1 class="text-center">✨ Создай свою сказку ✨</h1>

            <div class="row justify-content-center">
                <div class="col-md-6 ">
                    <input type="text" class="form-control" id="theme" placeholder="Например: волшебный лес и дракон">
                    <div class="d-grid mt-3">
                        <button onclick="generate()" class="btn btn-success">Создать сказку</button>
                    </div>
                </div>
            </div>

            <div class="container-sm result-container">
                <div class="row">
                    <div id="result" class="row mt-1"></div>
                    <div class="image-result row"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function generate() {
            const themeInput = document.getElementById("theme");
            const resultDiv = document.getElementById("result");
            const imageDiv = document.querySelector(".image-result");
            const theme = themeInput.value.trim();

            if (!theme) {
                resultDiv.innerText = "Введите тему сказки.";
                return;
            }

            resultDiv.innerText = "Генерируем сказку и картинки...";

            try {
                const response = await fetch("/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ theme })
                });

                const data = await response.json();

                if (data.error) {
                    resultDiv.innerText = data.error;
                } else {
                    resultDiv.innerHTML = `<p class='result-text'>${data.text}</p>`;
                    imageDiv.innerHTML = data.images.map(url => `<img src="${url}" class='result-img col-md-6'/>`).join("");
                }

            } catch (error) {
                resultDiv.innerText = "Ошибка подключения к серверу.";
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
